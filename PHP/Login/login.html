<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proyecto Integrador - Login</title>
    <link rel="stylesheet" href="../../CSS/Login/estilos.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <div class="contenedor">

        <!-- Lado izquierdo -->
        <div class="login-section">

            <div class="logo">
                <h2>Proyecto<br>Integrador</h2>
                <div class="circulo"></div>
            </div>

            <div class="card">
                <h3>Hola de nuevo, ¿Qué tal?</h3>

                <form>
                    <div class="input-group">
                        <input type="text" placeholder="Nombre de usuario">
                    </div>

                    <div class="input-group password">
                        <input type="password" placeholder="Ingresar contraseña">
                        <span class="eye">
                            <img src="../../assets/Login/ojo_abierto.png" alt="mostrar contraseña">
                        </span>
                    </div>

                    <div class="extras">
                        <label class="switch">
                            <input type="checkbox">
                            <span class="slider"></span>
                                Recordar usuario
                        </label>
                        <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn-login">Entrar</button>

                    <div class="divider"></div>

                    <button type="button" class="btn-google">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                        O únete con Google
                    </button>

                    <p class="register">
                        No tienes una cuenta aún?
                        <a href="#">Regístrate</a>
                    </p>

                </form>
            </div>

        </div>

        <!-- Lado derecho -->
        <div class="image-section">
            <img src="../../assets/Login/imagen_gajuar.png" class="jaguar" alt="Jaguar">

        </div>

    </div>

    <footer>
        © 2026 Proyecto Integrador. Todos los derechos reservados
    </footer>

</body>
</html>
