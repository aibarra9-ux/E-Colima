<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-COLIMA</title>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!--- ICONOS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

</head>
<body>

    <div class="top-bar">
        <!-- Izquierda: logo + perfil -->
        <div class="left-icons">
            <div class="logo-box">
                <img src="imagenes/logomini.png" alt="Logo" class="logo-img">
            </div>
            <div class="perfil-box">
                <i class="fas fa-user"></i>
            </div>
        </div>

        <!-- Derecha: buscador + idioma + login -->
        <div class="right-buttons">
            <div class="search-box">
                <input type="text" placeholder="Buscar...">
                <i class="fas fa-search"></i>
            </div>
            <div class="lang-box">ES / EN</div>
            <div class="login-box">Iniciar sesión</div>
        </div>
    </div>
    <div class="home">
        <h1 class="logo">
            E<span class="glass">CO</span>LIMA
        </h1>

    </div>  


    <section class="noticias">
        <h2>Noiticas de los ecosistemas de Colima</h2>
        <p>
            Noticia:
            Noticia:
            Noticia:
        </p>
    </section>

</body>
</html>
